<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page not found - Workflow Automation</title>
<style>
  :root {
    --bg: #e7e1d3;
    --paper: #f6f0e1;
    --ink: #0f0d0b;
    --muted: #524a3c;
    --accent: #1f3a8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    width: min(92vw, 680px);
    border: 3px solid var(--ink);
    background: var(--paper);
    box-shadow: 8px 8px 0 var(--ink);
    padding: clamp(28px, 6vw, 56px);
  }
  p.label {
    margin: 0 0 18px;
    font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
  }
  h1 {
    margin: 0;
    font-size: clamp(42px, 8vw, 82px);
    line-height: 0.95;
    letter-spacing: 0;
  }
  p.body {
    margin: 22px 0 0;
    max-width: 48ch;
    font-size: 18px;
    line-height: 1.55;
    color: var(--muted);
  }
  a {
    display: inline-block;
    margin-top: 28px;
    border: 2px solid var(--ink);
    background: #c69a2c;
    color: var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    padding: 12px 16px;
    text-decoration: none;
    font-weight: 800;
  }
</style>
</head>
<body>
<main>
  <p class="label">404 / Missing Route</p>
  <h1>This page is not wired.</h1>
  <p class="body">The workflow automation breakdown lives on the main system map.</p>
  <a href="/">Back to the system map</a>
</main>
</body>
</html>
